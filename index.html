<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gantt</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Roboto:wght@300;400;700&family=Open+Sans:wght@300;400;700&family=Montserrat:wght@300;400;700&family=Source+Sans+Pro:wght@300;400;700&family=Raleway:wght@300;400;700&family=PT+Sans:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f7cff;
    --accent2: #38d9a9;
    --text: #e8eaf6;
    --text-muted: #6b7280;
    --danger: #ff5c5c;
    --warn: #fbbf24;
    --bar-level1: #4f7cff;
    --bar-level2: #38d9a9;
    --dep-line: #fbbf24;
    --radius: 8px;
    --font: 'Lato', sans-serif;
    --font-size: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: var(--font-size); min-height: 100vh; }

  /* Layout */
  #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  #toolbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; flex-shrink: 0; }
  #toolbar h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-right: 8px; white-space: nowrap; }
  .toolbar-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .toolbar-sep { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }

  label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  input[type=date], input[type=text], input[type=number], select {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 5px; padding: 4px 8px; font-size: 13px; font-family: var(--font);
  }
  input[type=date]:focus, input[type=text]:focus, input[type=number]:focus, select:focus { outline: none; border-color: var(--accent); }
  select { cursor: pointer; }
  button {
    background: var(--accent); color: #fff; border: none; border-radius: 5px;
    padding: 5px 12px; font-size: 13px; font-family: var(--font); cursor: pointer;
    font-weight: 700; transition: opacity .15s; white-space: nowrap;
  }
  button:hover { opacity: .85; }
  button.secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-weight: 400; }
  button.danger { background: var(--danger); }
  button.success { background: var(--accent2); color: #0f1117; }

  /* Main area */
  #main { display: flex; flex: 1; overflow: hidden; }
  #sidebar { width: 320px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  #sidebar-header { padding: 10px 14px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
  #task-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  #task-list::-webkit-scrollbar { width: 6px; } #task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .task-item {
    padding: 7px 14px; border-bottom: 1px solid #1e2235; cursor: pointer;
    transition: background .12s; position: relative;
  }
  .task-item:hover { background: var(--surface2); }
  .task-item.selected { background: #1e2a4a; border-left: 3px solid var(--accent); }
  .task-item.level2 { padding-left: 28px; }
  .task-item .task-name { font-weight: 600; font-size: 13px; }
  .task-item.level2 .task-name { font-weight: 400; color: var(--accent2); }
  .task-item .task-dates { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .task-actions { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); display: none; gap: 4px; }
  .task-item:hover .task-actions { display: flex; }
  .task-actions button { padding: 2px 7px; font-size: 11px; }

  /* Edit panel */
  #edit-panel { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 14px; flex-shrink: 0; }
  #edit-panel h3 { font-size: 13px; margin-bottom: 10px; color: var(--accent); font-weight: 700; }
  .field-row { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
  .field-row label { font-size: 11px; }
  .field-row input, .field-row select, .field-row textarea { width: 100%; }
  textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 5px; padding: 4px 8px; font-size: 12px; font-family: var(--font); resize: vertical; }

  /* Gantt area */
  #gantt-container { flex: 1; overflow: auto; background: var(--bg); position: relative; }
  #gantt-container::-webkit-scrollbar { width: 8px; height: 8px; }
  #gantt-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  #gantt-svg-wrap { min-width: 100%; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 420px; max-width: 95vw; }
  .modal h2 { font-size: 16px; margin-bottom: 16px; color: var(--accent); }
  .modal .field-row { margin-bottom: 10px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* Dep tags */
  .dep-tag { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-size: 11px; margin: 2px; }
  .dep-tag button { background: none; border: none; color: var(--danger); font-size: 11px; cursor: pointer; padding: 0 2px; font-weight: 700; }
  #dep-list { display: flex; flex-wrap: wrap; margin-top: 4px; }
</style>
</head>
<body>
<div id="app">
  <!-- Toolbar -->
  <div id="toolbar">
    <h1>gantt</h1>
    <div class="toolbar-group">
      <label>Début projet</label>
      <input type="date" id="project-start">
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <label>Police</label>
      <select id="font-select">
        <option value="'Lato', sans-serif">Lato</option>
        <option value="'Roboto', sans-serif">Roboto</option>
        <option value="'Open Sans', sans-serif">Open Sans</option>
        <option value="'Montserrat', sans-serif">Montserrat</option>
        <option value="'Source Sans Pro', sans-serif">Source Sans Pro</option>
        <option value="'Raleway', sans-serif">Raleway</option>
        <option value="'PT Sans', sans-serif">PT Sans</option>
        <option value="monospace">Monospace</option>
      </select>
      <label>Taille</label>
      <input type="number" id="font-size" value="14" min="8" max="24" style="width:54px">
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <label>Zoom</label>
      <select id="zoom-select">
        <option value="30">Jour (30px)</option>
        <option value="20" selected>Jour (20px)</option>
        <option value="10">Jour (10px)</option>
        <option value="4">Semaine</option>
      </select>
    </div>
    <div class="toolbar-sep"></div>
    <button onclick="openAddModal(1)">+ Tâche</button>
    <button onclick="openAddModal(2)" class="secondary">+ Sous-tâche</button>
    <div class="toolbar-sep"></div>
    <button onclick="exportSVG()" class="success">↓ SVG</button>
    <div class="toolbar-sep"></div>
    <button onclick="saveState()" class="secondary" title="Enregistrer le diagramme (Ctrl+Shift+S)">💾 Enregistrer</button>
    <button onclick="document.getElementById('load-input').click()" class="secondary" title="Ouvrir un diagramme sauvegardé">📂 Ouvrir</button>
    <input type="file" id="load-input" accept=".gantt,.json" style="display:none" onchange="loadState(event)">
  </div>

  <div id="main">
    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">
        <span>Tâches</span>
        <span id="task-count" style="color:var(--text-muted);font-size:12px"></span>
      </div>
      <div id="task-list"></div>
      <div id="edit-panel" style="display:none">
        <h3 id="edit-title">Éditer la tâche</h3>
        <div class="field-row">
          <label>Nom</label>
          <input type="text" id="edit-name">
        </div>
        <div class="field-row">
          <label>Début</label>
          <input type="date" id="edit-start">
        </div>
        <div class="field-row">
          <label>Fin</label>
          <input type="date" id="edit-end">
        </div>
        <div class="field-row">
          <label>Couleur</label>
          <input type="color" id="edit-color" style="width:100%;height:30px;padding:2px;border-radius:5px;cursor:pointer;border:1px solid var(--border);background:var(--surface2)">
        </div>
        <div class="field-row" id="dep-field">
          <label>Dépendances</label>
          <div id="dep-list"></div>
          <select id="dep-select" style="width:100%;margin-top:4px"><option value="">-- Ajouter dépendance --</option></select>
        </div>
        <div style="display:flex;gap:6px;margin-top:8px">
          <button onclick="saveEdit()" style="flex:1">Enregistrer</button>
          <button onclick="closeEdit()" class="secondary">Annuler</button>
        </div>
      </div>
    </div>

    <!-- Gantt -->
    <div id="gantt-container">
      <div id="gantt-svg-wrap"></div>
    </div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2 id="modal-title">Nouvelle tâche</h2>
    <div class="field-row">
      <label>Nom</label>
      <input type="text" id="modal-name" placeholder="Nom de la tâche">
    </div>
    <div class="field-row">
      <label>Niveau</label>
      <select id="modal-level">
        <option value="1">Tâche principale (niveau 1)</option>
        <option value="2">Sous-tâche (niveau 2)</option>
      </select>
    </div>
    <div class="field-row" id="modal-parent-row" style="display:none">
      <label>Tâche parente</label>
      <select id="modal-parent"></select>
    </div>
    <div class="field-row">
      <label>Date de début</label>
      <input type="date" id="modal-start">
    </div>
    <div class="field-row">
      <label>Date de fin</label>
      <input type="date" id="modal-end">
    </div>
    <div class="field-row">
      <label>Couleur</label>
      <input type="color" id="modal-color" value="#4f7cff" style="width:100%;height:30px;padding:2px;border-radius:5px;cursor:pointer;border:1px solid var(--border);background:var(--surface2)">
    </div>
    <div class="modal-actions">
      <button onclick="closeModal()" class="secondary">Annuler</button>
      <button onclick="confirmAdd()">Ajouter</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let tasks = [
  { id: 1, name: 'Phase 1 — X', level: 1, start: '2026-06-01', end: '2026-09-01', color: '#4DBB9F', deps: [], parentId: null },
  { id: 2, name: 'X1', level: 2, start: '2026-06-01', end: '2026-07-01', color: '#4DBB9F', deps: [], parentId: 1 },
  { id: 3, name: 'X2', level: 2, start: '2026-07-01', end: '2026-09-01', color: '#4DBB9F', deps: [2], parentId: 1 },
  { id: 4, name: 'Phase 2 — Y', level: 1, start: '2026-09-15', end: '2026-12-01', color: '#4DBB9F', deps: [3], parentId: null },
  { id: 5, name: 'Y1', level: 2, start: '2026-09-15', end: '2026-11-01', color: '#4DBB9F', deps: [], parentId: 4 },
  { id: 6, name: 'Y2', level: 2, start: '2026-11-15', end: '2026-12-01', color: '#4DBB9F', deps: [5], parentId: 4 },
];
let nextId = 9;
let selectedId = null;
let projectStart = '2026-06-01';
let fontFamily = "'Lato', sans-serif";
let fontSize = 14;
let dayWidth = 4;

// ─── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('project-start').value = projectStart;
document.getElementById('font-select').value = fontFamily;
document.getElementById('font-size').value = fontSize;

document.getElementById('project-start').addEventListener('change', e => { projectStart = e.target.value; render(); });
document.getElementById('font-select').addEventListener('change', e => { fontFamily = e.target.value; document.documentElement.style.setProperty('--font', fontFamily); render(); });
document.getElementById('font-size').addEventListener('change', e => { fontSize = +e.target.value; document.documentElement.style.setProperty('--font-size', fontSize+'px'); render(); });
document.getElementById('zoom-select').addEventListener('change', e => { dayWidth = +e.target.value; render(); });
document.getElementById('modal-level').addEventListener('change', e => {
  const v = e.target.value;
  document.getElementById('modal-parent-row').style.display = v === '2' ? '' : 'none';
});

render();

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  renderSidebar();
  renderGantt();
  document.getElementById('task-count').textContent = tasks.length + ' tâche(s)';
}

function renderSidebar() {
  const list = document.getElementById('task-list');
  // Build ordered list: level1 then their level2 children
  const ordered = [];
  tasks.filter(t => t.level === 1).forEach(p => {
    ordered.push(p);
    tasks.filter(t => t.level === 2 && t.parentId === p.id).forEach(c => ordered.push(c));
  });
  tasks.filter(t => t.level === 2 && !t.parentId).forEach(t => ordered.push(t));

  list.innerHTML = ordered.map(t => `
    <div class="task-item ${t.level===2?'level2':''} ${t.id===selectedId?'selected':''}" onclick="selectTask(${t.id})">
      <div class="task-name">${t.level===2?'↳ ':''}${esc(t.name)}</div>
      <div class="task-dates">${t.start} → ${t.end}</div>
      <div class="task-actions">
        <button class="secondary" onclick="event.stopPropagation();editTask(${t.id})">✎</button>
        <button class="danger" onclick="event.stopPropagation();deleteTask(${t.id})">✕</button>
      </div>
    </div>`).join('');
}

function renderGantt() {
  const wrap = document.getElementById('gantt-svg-wrap');
  wrap.innerHTML = buildGanttSVG(false);
}

function buildGanttSVG(forExport) {
  const ordered = getOrdered();
  if (ordered.length === 0) { return '<svg width="400" height="80" xmlns="http://www.w3.org/2000/svg"><text x="20" y="40" fill="#6b7280" font-family="Lato,sans-serif" font-size="14">Aucune tâche. Ajoutez une tâche pour commencer.</text></svg>'; }

  // Date range
  const pStart = parseDate(projectStart);
  let minD = pStart, maxD = pStart;
  tasks.forEach(t => {
    const s = parseDate(t.start), e = parseDate(t.end);
    if (s < minD) minD = s;
    if (e > maxD) maxD = e;
  });
  // Extend by 5 days each side
  const startD = new Date(minD); startD.setDate(startD.getDate() - 3);
  const endD = new Date(maxD); endD.setDate(endD.getDate() + 5);
  const totalDays = Math.ceil((endD - startD) / 86400000);

  const labelW = 220;
  const rowH = 36;
  const headerH = 52;
  const W = labelW + totalDays * dayWidth;
  const H = headerH + ordered.length * rowH + 20;

  const font = forExport ? fontFamily.replace(/'/g, '') : fontFamily;
  const fs = fontSize;

  let svg = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" font-family="${font}" font-size="${fs}">`;
  svg += `<defs><clipPath id="chart-clip"><rect x="${labelW}" y="0" width="${totalDays*dayWidth}" height="${H}"/></clipPath></defs>`;

  // Background
  svg += `<rect width="${W}" height="${H}" fill="#0f1117"/>`;

  // Month headers
  let cur = new Date(startD);
  const monthNames = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  while (cur <= endD) {
    const dayOff = Math.ceil((cur - startD) / 86400000);
    const x = labelW + dayOff * dayWidth;
    if (cur.getDate() === 1 || dayOff === 0) {
      const label = monthNames[cur.getMonth()] + ' ' + cur.getFullYear();
      svg += `<rect x="${x}" y="0" width="${dayWidth*daysInMonth(cur)}" height="${headerH}" fill="#161926"/>`;
      svg += `<text x="${x+6}" y="18" fill="#9ca3af" font-size="11" font-weight="700">${label}</text>`;
    }
    cur.setDate(cur.getDate() + 1);
  }

  // Week lines & day columns
  cur = new Date(startD);
  while (cur <= endD) {
    const dayOff = Math.ceil((cur - startD) / 86400000);
    const x = labelW + dayOff * dayWidth;
    const isWeekend = cur.getDay() === 0 || cur.getDay() === 6;
    const isMonday = cur.getDay() === 1;
    if (isWeekend) svg += `<rect x="${x}" y="${headerH}" width="${dayWidth}" height="${H-headerH}" fill="#141720" opacity="0.5"/>`;
    if (isMonday || dayWidth >= 20) {
      svg += `<line x1="${x}" y1="32" x2="${x}" y2="${H}" stroke="#1e2235" stroke-width="1"/>`;
    }
    // Day number label
    if (dayWidth >= 16) {
      svg += `<text x="${x + dayWidth/2}" y="44" fill="${isWeekend?'#374151':'#4b5563'}" font-size="9" text-anchor="middle">${cur.getDate()}</text>`;
    }
    cur.setDate(cur.getDate() + 1);
  }

  // Today line
  const today = new Date(); today.setHours(0,0,0,0);
  const todayOff = Math.ceil((today - startD) / 86400000);
  if (todayOff >= 0 && todayOff <= totalDays) {
    const tx = labelW + todayOff * dayWidth;
    svg += `<line x1="${tx}" y1="0" x2="${tx}" y2="${H}" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>`;
    svg += `<text x="${tx+3}" y="14" fill="#ef4444" font-size="10">Aujourd'hui</text>`;
  }

  // Project start line
  const psOff = Math.ceil((pStart - startD) / 86400000);
  if (psOff >= 0 && psOff <= totalDays) {
    const px = labelW + psOff * dayWidth;
    svg += `<line x1="${px}" y1="${headerH}" x2="${px}" y2="${H}" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3"/>`;
  }

  // Row backgrounds
  ordered.forEach((t, i) => {
    const y = headerH + i * rowH;
    svg += `<rect x="0" y="${y}" width="${W}" height="${rowH}" fill="${i%2===0?'#0f1117':'#111420'}"/>`;
    svg += `<line x1="0" y1="${y+rowH}" x2="${W}" y2="${y+rowH}" stroke="#1a1d27" stroke-width="1"/>`;
    // Label
    const lx = t.level === 2 ? 22 : 10;
    const bold = t.level === 1 ? 'font-weight="700"' : '';
    const lcolor = t.level === 1 ? '#e8eaf6' : '#9ca3af';
    const label = t.level === 2 ? '↳ ' + t.name : t.name;
    svg += `<text x="${lx}" y="${y + rowH/2 + 5}" fill="${lcolor}" ${bold} font-size="${t.level===1?fs:fs-1}" clip-path="url(#label-clip)">${esc(truncate(label, Math.floor((labelW-lx-8)/7)))}</text>`;
  });

  // Dependency arrows (drawn behind bars)
  tasks.forEach(t => {
    if (!t.deps || t.deps.length === 0) return;
    t.deps.forEach(depId => {
      const fromTask = tasks.find(x => x.id === depId);
      if (!fromTask) return;
      const fromIdx = ordered.indexOf(fromTask);
      const toIdx = ordered.indexOf(t);
      if (fromIdx < 0 || toIdx < 0) return;
      const fromEnd = Math.ceil((parseDate(fromTask.end) - startD) / 86400000);
      const toStart = Math.ceil((parseDate(t.start) - startD) / 86400000);
      const x1 = labelW + fromEnd * dayWidth + dayWidth;
      const y1 = headerH + fromIdx * rowH + rowH / 2;
      const x2 = labelW + toStart * dayWidth;
      const y2 = headerH + toIdx * rowH + rowH / 2;
      const mid = (x1 + x2) / 2;
      svg += `<path d="M${x1},${y1} C${mid},${y1} ${mid},${y2} ${x2},${y2}" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>`;
      svg += `<polygon points="${x2},${y2} ${x2-7},${y2-4} ${x2-7},${y2+4}" fill="#fbbf24" opacity="0.8"/>`;
    });
  });

  // Bars
  ordered.forEach((t, i) => {
    const y = headerH + i * rowH;
    const barY = y + (t.level === 1 ? 10 : 12);
    const barH = t.level === 1 ? 16 : 12;
    const s = parseDate(t.start), e = parseDate(t.end);
    const x = labelW + Math.ceil((s - startD) / 86400000) * dayWidth;
    const w = Math.max(dayWidth, Math.ceil((e - s) / 86400000 + 1) * dayWidth);
    const r = barH / 2;
    const col = t.color || (t.level === 1 ? '#4f7cff' : '#38d9a9');
    // Bar shadow
    svg += `<rect x="${x+2}" y="${barY+2}" width="${w}" height="${barH}" rx="${r}" fill="rgba(0,0,0,0.3)"/>`;
    // Bar
    svg += `<rect x="${x}" y="${barY}" width="${w}" height="${barH}" rx="${r}" fill="${col}" opacity="${t.level===1?'0.9':'0.85'}"/>`;
    // Shine
    svg += `<rect x="${x+2}" y="${barY+1}" width="${w-4}" height="${barH/2-1}" rx="${r/2}" fill="rgba(255,255,255,0.12)"/>`;
    // Label on bar
    if (w > 40) {
      const barLabel = truncate(t.name, Math.floor((w-8)/7));
      svg += `<text x="${x + w/2}" y="${barY + barH/2 + 4}" fill="rgba(255,255,255,0.9)" font-size="${Math.max(9,fs-3)}" text-anchor="middle" font-weight="${t.level===1?'700':'400'}">${esc(barLabel)}</text>`;
    }
  });

  // Label panel separator
  svg += `<rect x="${labelW-1}" y="0" width="2" height="${H}" fill="#2e3350"/>`;
  // Label header bg
  svg += `<rect x="0" y="0" width="${labelW}" height="${headerH}" fill="#161926"/>`;
  svg += `<text x="10" y="30" fill="#9ca3af" font-size="12" font-weight="700">TÂCHES</text>`;

  svg += '</svg>';
  return svg;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function parseDate(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmtDate(d) {
  return d.toISOString().split('T')[0];
}
function daysInMonth(d) {
  return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function truncate(s, n) {
  return s.length > n ? s.slice(0, Math.max(1, n-1)) + '…' : s;
}
function getOrdered() {
  const ordered = [];
  tasks.filter(t => t.level === 1).forEach(p => {
    ordered.push(p);
    tasks.filter(t => t.level === 2 && t.parentId === p.id).forEach(c => ordered.push(c));
  });
  tasks.filter(t => t.level === 2 && !t.parentId).forEach(t => { if (!ordered.includes(t)) ordered.push(t); });
  return ordered;
}

// ─── CRUD ─────────────────────────────────────────────────────────────────────
function selectTask(id) {
  selectedId = id;
  render();
  editTask(id);
}

function editTask(id) {
  selectedId = id;
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const panel = document.getElementById('edit-panel');
  panel.style.display = '';
  document.getElementById('edit-title').textContent = t.level === 1 ? '✎ Tâche principale' : '✎ Sous-tâche';
  document.getElementById('edit-name').value = t.name;
  document.getElementById('edit-start').value = t.start;
  document.getElementById('edit-end').value = t.end;
  document.getElementById('edit-color').value = t.color || '#4f7cff';
  renderDepList(t);
  populateDepSelect(t);
  renderSidebar();
}

function renderDepList(t) {
  const list = document.getElementById('dep-list');
  list.innerHTML = (t.deps || []).map(depId => {
    const dep = tasks.find(x => x.id === depId);
    return dep ? `<span class="dep-tag">${esc(dep.name)} <button onclick="removeDep(${depId})">×</button></span>` : '';
  }).join('');
}

function populateDepSelect(t) {
  const sel = document.getElementById('dep-select');
  sel.innerHTML = '<option value="">-- Ajouter dépendance --</option>';
  tasks.filter(x => x.id !== t.id && !(t.deps||[]).includes(x.id)).forEach(x => {
    sel.innerHTML += `<option value="${x.id}">${esc(x.name)}</option>`;
  });
  sel.onchange = () => {
    if (!sel.value) return;
    const depId = +sel.value;
    const cur = tasks.find(x => x.id === selectedId);
    if (cur && !cur.deps.includes(depId)) { cur.deps.push(depId); renderDepList(cur); populateDepSelect(cur); }
    sel.value = '';
  };
}

function removeDep(depId) {
  const t = tasks.find(x => x.id === selectedId);
  if (!t) return;
  t.deps = t.deps.filter(d => d !== depId);
  renderDepList(t);
  populateDepSelect(t);
}

function saveEdit() {
  const t = tasks.find(x => x.id === selectedId);
  if (!t) return;
  t.name = document.getElementById('edit-name').value || t.name;
  t.start = document.getElementById('edit-start').value || t.start;
  t.end = document.getElementById('edit-end').value || t.end;
  t.color = document.getElementById('edit-color').value;
  render();
}

function closeEdit() {
  selectedId = null;
  document.getElementById('edit-panel').style.display = 'none';
  render();
}

function deleteTask(id) {
  if (!confirm('Supprimer cette tâche ?')) return;
  // Remove task and its children
  tasks = tasks.filter(t => t.id !== id && t.parentId !== id);
  // Remove from deps
  tasks.forEach(t => { t.deps = (t.deps||[]).filter(d => d !== id); });
  if (selectedId === id) closeEdit();
  render();
}

// ─── Add Modal ────────────────────────────────────────────────────────────────
function openAddModal(level) {
  const modal = document.getElementById('add-modal');
  document.getElementById('modal-level').value = level;
  document.getElementById('modal-parent-row').style.display = level === 2 ? '' : 'none';
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-start').value = projectStart;
  const end = new Date(projectStart); end.setDate(end.getDate()+7);
  document.getElementById('modal-end').value = fmtDate(end);
  document.getElementById('modal-color').value = level === 1 ? '#4f7cff' : '#38d9a9';
  // Populate parent select
  const psel = document.getElementById('modal-parent');
  psel.innerHTML = tasks.filter(t => t.level === 1).map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('');
  modal.classList.add('open');
  setTimeout(() => document.getElementById('modal-name').focus(), 50);
}

function closeModal() {
  document.getElementById('add-modal').classList.remove('open');
}

function confirmAdd() {
  const name = document.getElementById('modal-name').value.trim();
  if (!name) { alert('Veuillez saisir un nom.'); return; }
  const level = +document.getElementById('modal-level').value;
  const parentId = level === 2 ? (+document.getElementById('modal-parent').value || null) : null;
  const t = {
    id: nextId++,
    name,
    level,
    start: document.getElementById('modal-start').value,
    end: document.getElementById('modal-end').value,
    color: document.getElementById('modal-color').value,
    deps: [],
    parentId
  };
  tasks.push(t);
  closeModal();
  render();
}

// ─── Export SVG ───────────────────────────────────────────────────────────────
function exportSVG() {
  const svgStr = buildGanttSVG(true);
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gantt.svg';
  a.click();
}

// ─── Enregistrer / Ouvrir ─────────────────────────────────────────────────────
function saveState() {
  const state = {
    version: 1,
    savedAt: new Date().toISOString(),
    projectStart,
    fontFamily,
    fontSize,
    dayWidth,
    nextId,
    tasks
  };
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  const name = 'gantt_' + projectStart + '.gantt';
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadState(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const state = JSON.parse(e.target.result);
      if (!state.tasks || !Array.isArray(state.tasks)) throw new Error('Format invalide');

      tasks = state.tasks;
      nextId = state.nextId ?? (Math.max(0, ...tasks.map(t => t.id)) + 1);
      selectedId = null;

      // Restore project settings
      if (state.projectStart) {
        projectStart = state.projectStart;
        document.getElementById('project-start').value = projectStart;
      }
      if (state.fontFamily) {
        fontFamily = state.fontFamily;
        document.getElementById('font-select').value = fontFamily;
        document.documentElement.style.setProperty('--font', fontFamily);
      }
      if (state.fontSize) {
        fontSize = state.fontSize;
        document.getElementById('font-size').value = fontSize;
        document.documentElement.style.setProperty('--font-size', fontSize + 'px');
      }
      if (state.dayWidth) {
        dayWidth = state.dayWidth;
        document.getElementById('zoom-select').value = dayWidth;
      }

      document.getElementById('edit-panel').style.display = 'none';
      render();

      const d = state.savedAt ? ' (sauvegardé le ' + new Date(state.savedAt).toLocaleString('fr-FR') + ')' : '';
      showNotif('✓ Diagramme chargé' + d);
    } catch (err) {
      alert('Erreur lors de l\'ouverture du fichier : ' + err.message);
    }
    // Reset input so the same file can be re-chargé
    event.target.value = '';
  };
  reader.readAsText(file);
}

function showNotif(msg) {
  let n = document.getElementById('save-notif');
  if (!n) {
    n = document.createElement('div');
    n.id = 'save-notif';
    n.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#22263a;border:1px solid #38d9a9;color:#38d9a9;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;transition:opacity .4s;box-shadow:0 4px 16px rgba(0,0,0,.4)';
    document.body.appendChild(n);
  }
  n.textContent = msg;
  n.style.opacity = '1';
  clearTimeout(n._t);
  n._t = setTimeout(() => { n.style.opacity = '0'; }, 2800);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeEdit(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && document.getElementById('add-modal').classList.contains('open')) confirmAdd();
  if ((e.ctrlKey || e.metaKey) && e.key === 's' && !e.shiftKey) { e.preventDefault(); saveEdit(); }
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'S') { e.preventDefault(); saveState(); }
});
</script>
